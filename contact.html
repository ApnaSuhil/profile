<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Suhil Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* BG EFFECT */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background: repeating-linear-gradient(45deg,#000 0,#000 40px,#ff0000 40px,#ff0000 42px);
opacity:0.15;
animation: moveLines 10s linear infinite;
z-index:-2;
}

@keyframes moveLines{100%{background-position:200px 200px;}}

/* HERO */
.hero{
width:100%;
height:220px;
background:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
padding:10px;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero h1{
position:relative;
z-index:2;
font-size:18px;
line-height:1.5;
}

/* FORM */
.container{
width:95%;
max-width:420px;
margin:-60px auto 20px;
padding:25px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
animation: popup 0.8s ease;
}

@keyframes popup{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.inputBox{
position:relative;
margin-bottom:18px;
}

.inputBox input,
.inputBox select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background: rgba(255,255,255,0.1);
color:#ff0000;
outline:none;
transition:0.3s;
}

.inputBox input:focus,
.inputBox select:focus{
box-shadow:0 0 10px #ff0000;
transform:scale(1.03);
}

/* LABEL */
.inputBox label{
position:absolute;
top:50%;
left:12px;
transform:translateY(-50%);
color:#aaa;
transition:0.3s;
pointer-events:none;
}

.inputBox input:focus ~ label,
.inputBox input:valid ~ label,
.inputBox select:focus ~ label,
.inputBox select:valid ~ label{
top:-8px;
font-size:11px;
background:#000;
padding:0 6px;
}

/* BUTTON */
button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background: linear-gradient(45deg,#ff0000,#990000);
color:#fff;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff0000;
}

/* SUCCESS */
.success{
color:#00ffae;
animation: glow 1s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #00ffae;}
to{text-shadow:0 0 20px #00ffae;}
}

#msg{text-align:center;margin-top:10px;}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="magicSound" src="https://www.soundjay.com/misc/sounds/magic-chime-02.mp3"></audio>

<!-- HERO -->
<div class="hero">
<h1>
Start Earning 💰 Stable Income With Suhil Kumar <br>
Helping Others To Achieve Their Dreams <br>
1000+ People Earning With Suhil
</h1>
</div>

<div class="container">

<h3 style="text-align:center;margin-bottom:15px;">🚀 Join With Suhil Kumar</h3>

<form id="form">

<div class="inputBox">
<input type="text" name="name" required>
<label>Your Name</label>
</div>

<div class="inputBox">
<input type="number" name="age" required>
<label>Age</label>
</div>

<div class="inputBox">
<input type="text" name="city" required>
<label>City</label>
</div>

<div class="inputBox">
<input type="text" name="state" required>
<label>State</label>
</div>

<div class="inputBox">
<input type="text" name="phone" required>
<label>Phone</label>
</div>

<div class="inputBox">
<input type="email" name="email" required>
<label>Email</label>
</div>

<div class="inputBox">
<select name="direct" required>
<option value="" disabled selected></option>
<option>Yes</option>
<option>No</option>
</select>
<label>Direct Selling</label>
</div>

<button type="submit">🚀 Join Now on WhatsApp</button>

</form>

<p id="msg"></p>

</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let form = document.getElementById("form");
let magicSound = document.getElementById("magicSound");

/* 🔊 SOUND FIX (USER INTERACTION BASED) */
let soundUnlocked = false;

function unlockSound(){
  if(!soundUnlocked){
    magicSound.play().then(()=>{
      magicSound.pause();
      magicSound.currentTime = 0;
      soundUnlocked = true;
    }).catch(()=>{});
  }
}

/* INPUT INTERACTION → SOUND ENABLE */
document.querySelectorAll("input, select").forEach(el=>{
  el.addEventListener("focus", unlockSound);
});

/* SUBMIT */
form.addEventListener("submit", function(e){
e.preventDefault();

/* 🔥 MAGIC SOUND ONLY ON SUBMIT */
magicSound.currentTime = 0;
magicSound.play();

/* CONFETTI 🎇 */
confetti({particleCount:200,spread:120,origin:{y:0.6}});

let name = form.name.value;
let age = form.age.value;
let city = form.city.value;
let state = form.state.value;
let phone = form.phone.value;
let email = form.email.value;
let direct = form.direct.value;

/* MESSAGE */
let message = `🔥 *New Join Request* 🔥

👤 *Name:* ${name}
🎂 *Age:* ${age}
🏙 *City:* ${city}
🗺 *State:* ${state}
📞 *Phone:* ${phone}
📧 *Email:* ${email}
💼 *Direct Selling:* ${direct}

🚀 Interested to join your team!`;

/* OPEN WHATSAPP */
setTimeout(()=>{
window.open("https://wa.me/917270927003?text=" + encodeURIComponent(message), "_blank");
},800);

/* UI */
document.getElementById("msg").innerHTML="🎉 Success! WhatsApp Opened!";
document.getElementById("msg").className="success";

form.reset();

});

</script>

</body>
</html>
