<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

/* ===== ANIMATED BACKGROUND ===== */
body{
  min-height:100vh;
  color:white;
  overflow-x:hidden;

  background: linear-gradient(-45deg, #000000, #5a0000, #8b0000, #ff0000);
  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

/* STRIPES */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: repeating-linear-gradient(
    -25deg,
    rgba(255,0,0,0.15) 0px,
    rgba(255,0,0,0.15) 60px,
    transparent 60px,
    transparent 120px
  );
  animation: stripeMove 8s linear infinite;
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes stripeMove{
  0%{transform:translateX(0);}
  100%{transform:translateX(-200px);}
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.follow-btn{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:30px;
  cursor:pointer;
}

.profile-icon{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:50%;
}

/* MAIN */
.main-layout{
  display:flex;
  min-height:90vh;
}

/* LEFT */
.left{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* RIGHT */
.right{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PROFILE */
.profile-img{
  width:220px;
  height:220px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.5);
}

.profile h1{
  margin-top:15px;
  font-size:28px;
}

.profile p{
  margin-top:10px;
  line-height:1.6;
}

/* SOCIAL */
.social-icons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.social-icons a{
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:24px;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

/* COLORS */
.social-icons a:nth-child(1){background:#25D366;}
.social-icons a:nth-child(2){background:#E1306C;}
.social-icons a:nth-child(3){background:#1877F2;}
.social-icons a:nth-child(4){background:#FF0000;}
.social-icons a:nth-child(5){background:#0A66C2;}

.social-icons a:hover{
  transform:scale(1.2);
  box-shadow:0 0 20px rgba(255,255,255,0.7);
}

/* ===== BANNER FIXED CENTER ===== */
.banner-link{
  text-decoration:none;
  color:inherit;
  width:100%;
  display:flex;
  justify-content:center;
}

.banner{
  max-width:600px;
  width:100%;
  padding:15px 30px;
  border-radius:50px;

  display:flex;
  align-items:center;
  justify-content:center;  /* 🔥 CENTER EVERYTHING */
  gap:12px;

  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);
}

/* IMAGE */
.banner img{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* TEXT */
.tagline{
  font-weight:bold;
  white-space:nowrap;
  text-align:center;
}

/* FLOAT WHATSAPP */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:white;
  text-decoration:none;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7);}
  70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

/* MOBILE PERFECT */
@media(max-width:768px){
  .main-layout{
    flex-direction:column;
  }

  .left,.right{
    width:100%;
    padding:20px;
  }

  /* MOBILE TEXT BREAK ALLOWED */
  .tagline{
    white-space:normal;
    text-align:center;
  }

  .banner{
    flex-direction:column;
    text-align:center;
  }
}

</style>
